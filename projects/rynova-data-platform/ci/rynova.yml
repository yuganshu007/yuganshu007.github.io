name: rynova-compliance

on:
  push:
    paths:
      - "rynova/**"
      - ".github/workflows/rynova.yml"
  pull_request:
    paths:
      - "rynova/**"
      - ".github/workflows/rynova.yml"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: rynova
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: rynova/requirements-dev.txt

      - name: Set up JDK (for Java backend compile check)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Lint (ruff)
        run: python -m ruff check src tests benchmarks scripts

      - name: Run pytest suite
        run: python -m pytest -q

      - name: Generate fixtures (quick)
        env:
          RYNOVA_QUICK: "1"
        run: python scripts/generate_fixtures.py

      - name: Bullet 1 — async REST + 40% query latency
        env:
          RYNOVA_QUICK: "1"
        run: python benchmarks/bench_bullet1_query_latency.py

      - name: Bullet 2 — ETL: ≥30% pipeline failure cut
        env:
          RYNOVA_QUICK: "1"
        run: python benchmarks/bench_bullet2_pipeline_failures.py

      - name: Bullet 3 — Kafka idempotency + 33+ DQ
        env:
          RYNOVA_QUICK: "1"
        run: python benchmarks/bench_bullet3_kafka_idempotency.py

      - name: Bullet 4 — SQL plans + 100% on-time
        env:
          RYNOVA_QUICK: "1"
        run: python benchmarks/bench_bullet4_sql_plans.py
